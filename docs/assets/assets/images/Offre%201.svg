<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5f5f5;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="300" fill="url(#bgGradient)" rx="24"/>

  <!-- Left side: Hello, Neo. text -->
  <text x="40" y="80" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#000">Hello, Neo.</text>

  <!-- MacBook image placeholder -->
  <rect x="40" y="120" width="240" height="160" fill="#c0c0c0" rx="4" stroke="#999" stroke-width="2"/>
  <rect x="50" y="130" width="220" height="130" fill="linear-gradient(180deg, #ffff00, #00ff00, #00ffff)" rx="2"/>
  <rect x="40" y="280" width="240" height="8" fill="#999"/>

  <!-- Right side: Prices -->
  <text x="360" y="80" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#2563eb">En 1 fois</text>
  <text x="360" y="140" font-family="Arial, sans-serif" font-size="56" font-weight="900" fill="#2563eb">699€</text>

  <text x="360" y="190" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#2563eb">En 4 fois</text>
  <text x="360" y="250" font-family="Arial, sans-serif" font-size="48" font-weight="900" fill="#2563eb">179€</text>
  <text x="530" y="235" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#2563eb">37</text>

  <!-- Button -->
  <rect x="360" y="260" width="350" height="20" fill="none" stroke="#000" stroke-width="2" rx="10"/>
  <text x="450" y="275" font-family="Arial, sans-serif" font-size="14" fill="#000" text-anchor="middle">Disponible maintenant</text>

  <!-- MacBook text -->
  <text x="600" y="280" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#000">MacBook Neo</text>
</svg>
